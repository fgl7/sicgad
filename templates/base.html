{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <title>{% block title %}SICGAD{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/app.css' %}" />
  <link rel="stylesheet" href="{% static 'css/sicgad_theme.css' %}?v=3" />
  <!-- Tailwind CSS via CDN (modo desarrollo) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563eb',
            secondary: '#3b82f6',
            emerald: {
              DEFAULT: '#10b981',
              500: '#10b981',
            },
            slate: {
              950: '#020617',
            }
          },
          fontFamily: {
            sans: ['Source Sans 3', 'Inter', 'sans-serif'],
            heading: ['Lexend', 'Source Sans 3', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  {% block extra_head %}{% endblock %}
</head>

<body class="min-h-screen selection:bg-sky-400/30 antialiased font-body saas-hybrid">
  <div class="fixed inset-0 -z-10" aria-hidden="true">
    <div class="absolute -top-36 -left-24 h-[28rem] w-[28rem] rounded-full bg-white/10 blur-3xl"></div>
    <div class="absolute bottom-0 right-0 h-[36rem] w-[36rem] rounded-full bg-blue-500/20 blur-3xl"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-black/40"></div>
  </div>

  <div class="app-shell">
    <div class="flex min-h-screen relative z-10">
      {% include "partials/sidebar.html" %}
      <div class="flex-1 flex flex-col">
        {% include "partials/topbar.html" %}
        <main class="flex-1 p-4 lg:p-6 relative z-10">
        <!-- System Messages (Toasts) -->
        <div x-data="{ 
                  toasts: [
                      {% for message in messages %}
                      { id: {{ forloop.counter }}, text: '{{ message|escapejs }}', tags: '{{ message.tags }}', show: true },
                      {% endfor %}
                  ] 
              }" class="fixed top-6 right-6 z-[100] flex flex-col gap-3 w-full max-w-sm pointer-events-none">

          <template x-for="toast in toasts" :key="toast.id">
            <div x-show="toast.show" x-init="setTimeout(() => toast.show = false, 5000)"
              x-transition:enter="transition ease-out duration-300"
              x-transition:enter-start="opacity-0 transform translate-x-8"
              x-transition:enter-end="opacity-100 transform translate-x-0"
              x-transition:leave="transition ease-in duration-200"
              x-transition:leave-start="opacity-100 transform translate-x-0"
              x-transition:leave-end="opacity-0 transform translate-x-8"
              class="pointer-events-auto p-4 rounded-2xl glass-effect shadow-2xl flex items-center gap-4 group" :class="{
                           'border-emerald-500/30 bg-emerald-500/10': toast.tags === 'success',
                           'border-red-500/30 bg-red-500/10': toast.tags === 'error',
                           'border-amber-500/30 bg-amber-500/10': toast.tags === 'warning',
                           'border-sky-500/30 bg-sky-500/10': toast.tags === 'info' || !toast.tags
                       }">

              <!-- Icon -->
              <div class="shrink-0 w-8 h-8 rounded-xl flex items-center justify-center" :class="{
                               'bg-emerald-500/20 text-emerald-500': toast.tags === 'success',
                               'bg-red-500/20 text-red-500': toast.tags === 'error',
                               'bg-amber-500/20 text-amber-500': toast.tags === 'warning',
                               'bg-sky-500/20 text-sky-500': toast.tags === 'info' || !toast.tags
                           }">
                <template x-if="toast.tags === 'success'">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                  </svg>
                </template>
                <template x-if="toast.tags === 'error'">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 9v2m0 4h.01m-6.938 4h13.876c.54 0 .899-.596.63-1.026L13.03 4.062a1.012 1.012 0 00-1.817 0l-7.73 13.912c-.269.43-.269.946.063 1.026z">
                    </path>
                  </svg>
                </template>
                <template x-if="toast.tags === 'warning' || toast.tags === 'info' || !toast.tags">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                  </svg>
                </template>
              </div>

              <!-- Text -->
              <div class="flex-1">
                <p class="text-sm font-bold text-slate-100 leading-snug" x-text="toast.text"></p>
              </div>

              <!-- Close Button -->
              <button @click="toast.show = false" class="text-slate-400 hover:text-slate-600 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
              </button>
            </div>
          </template>
        </div>
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
  </div>
  {% block modal %}{% endblock %}
  {% block extra_js %}{% endblock %}
</body>

</html>
