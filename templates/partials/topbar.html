<header class='topbar-flat h-[92px] min-h-[92px] shrink-0 flex items-center justify-between gap-3 px-3 sm:px-5 lg:px-8 sticky top-0 z-40 bg-transparent'>
  <div class='flex min-w-0 items-center gap-3 sm:gap-4'>
    <button type="button" @click="$dispatch('open-mobile-sidebar')" aria-label="Abrir navegacion"
      class='lg:hidden inline-flex items-center justify-center p-2 rounded-lg bg-slate-900 border border-slate-800 shrink-0'>
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>
    <div class="flex min-w-0 flex-col justify-center py-1">
        <h1 class='text-base sm:text-lg leading-tight font-header font-bold tracking-tight text-white truncate'>
        {{ current_section|default:"Inicio" }}
        </h1>
        <p class="hidden sm:block mt-1 text-[10px] leading-none text-slate-500 uppercase tracking-widest font-bold truncate">Estado Plurinacional de Bolivia</p>
    </div>
  </div>

  <div class='flex min-w-0 items-center gap-3 sm:gap-6'>
    <div class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/20">
        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
        <span class="text-[10px] font-bold text-emerald-400 uppercase tracking-wider">Entorno demostrativo con datos ficticios</span>
    </div>

    {% if request.user.is_authenticated %}
      <div class='flex min-w-0 items-center gap-2 sm:gap-4'>
        <div class="hidden sm:flex min-w-0 flex-col items-end justify-center py-1">
            <span class='text-xs font-semibold text-slate-200 truncate topbar-user-meta'>{{ request.user.get_full_name|default:request.user.username }}</span>
            <span class="mt-1 text-[10px] leading-none text-slate-500 uppercase tracking-tighter truncate topbar-user-meta">{{ role|default:"Usuario autenticado" }}</span>
        </div>
        <div class="w-9 h-9 rounded-full bg-surface border border-surface-light flex items-center justify-center shadow-neon shrink-0">
            <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </div>
      </div>
    {% endif %}
  </div>
</header>
