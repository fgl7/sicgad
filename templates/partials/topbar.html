<header class='h-14 bg-slate-950/70 border-b border-slate-800 flex items-center justify-between px-4'>
  <div class='flex items-center gap-3'>
    <button class='md:hidden inline-flex items-center justify-center rounded-md border border-slate-700 px-2 py-1 text-xs'>
      Menu
    </button>
    <h1 class='text-sm md:text-base font-semibold'>
      {{ current_section|default:"Inicio" }}
    </h1>
  </div>
  <div class='flex items-center gap-3 text-xs md:text-sm'>
    <div class='hidden sm:flex items-center gap-2'>
      <span class='text-slate-400'>Planta:</span>
      <select class='bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs'>
        <option>PCS</option>
        <option>PICP</option>
        <option>PICL</option>
      </select>
    </div>
    {% if request.user.is_authenticated %}
      <div class='flex items-center gap-2'>
        <span class='text-slate-400 hidden sm:inline'>Usuario:</span>
        <span class='text-slate-100 text-xs'>{{ request.user.username }}</span>
        <form method='post' action='{% url 'logout' %}'>
          {% csrf_token %}
          <button
            type='submit'
            class='inline-flex items-center px-2 py-1 rounded-md border border-slate-700 text-[11px] text-slate-200 hover:bg-slate-800'
          >
            Logout
          </button>
        </form>
      </div>
    {% endif %}
  </div>
</header>
