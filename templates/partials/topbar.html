<header class='h-16 glass-effect border-b border-white/5 flex items-center justify-between px-8 sticky top-0 z-40'>
  <div class='flex items-center gap-4'>
    <button class='lg:hidden inline-flex items-center justify-center p-2 rounded-lg bg-slate-900 border border-slate-800'>
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>
    <div class="flex flex-col">
        <h1 class='text-lg font-header font-bold tracking-tight text-white'>
        {{ current_section|default:"Inicio" }}
        </h1>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Estado Plurinacional de Bolivia</p>
    </div>
  </div>

  <div class='flex items-center gap-6'>
    <div class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/20">
        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
        <span class="text-[10px] font-bold text-emerald-400 uppercase tracking-wider">Sistema en línea</span>
    </div>

    {% if request.user.is_authenticated %}
      <div class='flex items-center gap-4'>
        <div class="flex flex-col items-end">
            <span class='text-xs font-semibold text-slate-200'>{{ request.user.get_full_name|default:request.user.username }}</span>
            <span class="text-[10px] text-slate-500 uppercase tracking-tighter">{{ role|default:"Usuario Autenticado" }}</span>
        </div>
        <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-slate-800 to-slate-700 border border-white/10 flex items-center justify-center shadow-lg">
            <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </div>
      </div>
    {% endif %}
  </div>
</header>
